<html>
    <head>
         <script src="../Web Tech Lab Task/script.js"></script>
    </head>

<body>
    
    <script>
        document.write("<h1>Login form</h1>");
    </script>
    <table>
        <tr>
            <td>Email</td>
            <td>
                <input type="text" id="email" name="email" placeholder="Enter your email" onchange="return getEmail();"/>
            </td>
            <td>
                <p id="emailErr"></p>
            </td>
        </tr>
        <tr>
            <td>Password</td>
            <td>
                 <input type="password" id="password" name="password" placeholder="Enter your password" onkeyup="return getPassword();"/>
            </td>
            <td> <p id="passwordErr"></p></td>

        </tr>
        <tr>
            <td>
                <input type="submit" name="Login" id="Login" onclick="return collect_data();"/>

            </td>
        </tr>
    </table>
    <p id="Count">Wrong Submit:0</p>
</body>
</html>
